spring.application.name=knup-backend

# ── Database (MySQL) ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/knup?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Session ───────────────────────────────────────────────────────
server.servlet.session.timeout=30m

# ── AI (Google Gemini) ────────────────────────────────────────────
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# ── Multipart (PDF upload for AI quiz generation) ─────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
