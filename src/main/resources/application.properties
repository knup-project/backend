spring.application.name=knup-backend

# ── Database (MySQL) ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/knup?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Session ───────────────────────────────────────────────────────
server.servlet.session.timeout=30m
# Frontend and backend are different sites (different domains), so the session
# cookie must be SameSite=None; Secure for the browser to send it cross-site.
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
# Honor X-Forwarded-* from the nginx TLS terminator (scheme/host detection).
server.forward-headers-strategy=framework

# ── AI (Google Gemini) ────────────────────────────────────────────
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash-lite}

# ── Multipart (PDF upload for AI quiz generation) ─────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ── Monitoring (Actuator + Prometheus) ────────────────────────────
# Actuator 는 별도 포트(8081)로 분리 — 외부(nginx:8080)로 노출되지 않게 한다.
# 같은 compose 네트워크의 Prometheus 만 backend:8081/actuator/prometheus 를 스크래핑.
management.server.port=8081
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=knup-backend
